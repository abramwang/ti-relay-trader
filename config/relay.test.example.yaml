# relay broker-test example configuration.
# Copy to config/relay.test.yaml on the deployment host and fill credentials
# there. This file is safe to commit because it contains placeholders only.

service:
  public_url: "http://relay-trader.quantstage.com"
  docs_addr: "0.0.0.0:9092"
  api_addr: "0.0.0.0:9092"
  mode: "docs"
  environment: "test"
  timezone: "Asia/Shanghai"
  log_level: "info"
  log_format: "json"

database:
  driver: "postgres"
  dsn: "postgres://<user>:<password>@<host>:5432/<database>?sslmode=disable"
  max_open_conns: 16
  max_idle_conns: 4

redis:
  url: "redis://:<password>@<test-redis-host>:6379/0"
  # Keep this value aligned with the front service stream namespace. Some
  # broker test counters may still use relay:prod:* stream names.
  env: "prod"
  broker_id: "huaxin"
  gateway_id: "<test_gateway_id>"

market:
  base_url: "http://meridian-data.quantstage.com"
  timeout_seconds: 15
  snapshot_market_level: "level1"
  snapshot_data_scope: "realtime"

auto_refresh:
  enabled: true
  debounce_seconds: 2
  cooldown_seconds: 20
  timeout_seconds: 10

accounts:
  - account_id: "<test_account_id>"
    broker_id: "huaxin"
    gateway_id: "<test_gateway_id>"
    stream_prefix: "relay:prod:v1:huaxin:<test_gateway_id>"
    enabled: true
    trading_enabled: true
    simulated: false

jobs:
  pre_open_init:
    enabled: false
    schedule: "25 8 * * 1-5"
  post_close_settlement:
    enabled: false
    schedule: "45 15 * * 1-5"
  reconcile:
    enabled: false
    schedule: "30 16 * * 1-5"
  asset_snapshot:
    enabled: false
    schedule: "55 15 * * 1-5"
  pnl:
    enabled: false
    schedule: "10 17 * * 1-5"
