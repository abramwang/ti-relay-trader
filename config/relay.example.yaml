# relay example configuration.
# Copy this file to config/relay.local.yaml or config/relay.prod.yaml on the
# deployment host, then fill in real credentials there. Local config files are
# intentionally ignored by git.

service:
  public_url: "http://relay-trader.quantstage.com"
  docs_addr: "0.0.0.0:9092"
  api_addr: "0.0.0.0:9092"
  mode: "docs"
  environment: "test"
  timezone: "Asia/Shanghai"
  log_level: "info"
  log_format: "json"

database:
  driver: "postgres"
  # Use a real DSN only in an untracked local config file.
  dsn: "postgres://<user>:<password>@<host>:5432/<database>?sslmode=disable"
  max_open_conns: 16
  max_idle_conns: 4

redis:
  # Use a real Redis URL only in an untracked local config file.
  url: "redis://:<password>@<host>:6379/0"
  env: "prod"
  broker_id: "huaxin"
  gateway_id: "<gateway_id>"

market:
  base_url: "http://meridian-data.quantstage.com"
  timeout_seconds: 15
  snapshot_market_level: "level1"
  snapshot_data_scope: "realtime"

auto_refresh:
  # When order/fill events arrive from Redis, relay coalesces one asset query and
  # one positions query per account. This keeps /trade fresh without polling the
  # broker counter too aggressively.
  enabled: true
  debounce_seconds: 2
  cooldown_seconds: 20
  timeout_seconds: 10

accounts:
  - account_id: "<account_id>"
    alias: "策略账户"
    broker_id: "huaxin"
    gateway_id: "<gateway_id>"
    stream_prefix: "relay:prod:v1:huaxin:<gateway_id>"
    enabled: true
    trading_enabled: false
    simulated: false

jobs:
  # All schedules use Asia/Shanghai time. Keep the host timezone or CRON_TZ in
  # sync with service.timezone.
  pre_open_init:
    enabled: true
    schedule: "1 9 * * 1-5"
  post_close_settlement:
    enabled: true
    schedule: "45 15 * * 1-5"
  reconcile:
    enabled: true
    schedule: "30 16 * * 1-5"
  asset_snapshot:
    enabled: true
    schedule: "55 15 * * 1-5"
  pnl:
    enabled: true
    schedule: "10 17 * * 1-5"
