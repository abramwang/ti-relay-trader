# relay production example configuration.
# Copy to config/relay.prod.yaml on the deployment host and fill credentials
# from the secure operations channel. Do not commit the copied file.

service:
  public_url: "http://relay-trader.quantstage.com"
  docs_addr: "0.0.0.0:9092"
  api_addr: "0.0.0.0:9092"
  mode: "docs"
  environment: "production"
  timezone: "Asia/Shanghai"
  log_level: "info"
  log_format: "json"

database:
  driver: "postgres"
  dsn: "postgres://<user>:<password>@<host>:5432/<database>?sslmode=disable"
  max_open_conns: 16
  max_idle_conns: 4

redis:
  url: "redis://:<password>@<production-redis-host>:<production-redis-port>/0"
  env: "prod"
  broker_id: "huaxin"
  gateway_id: "<production_gateway_id>"

market:
  base_url: "http://meridian-data.quantstage.com"
  timeout_seconds: 15
  snapshot_market_level: "level1"
  snapshot_data_scope: "realtime"

auto_refresh:
  enabled: true
  debounce_seconds: 2
  cooldown_seconds: 20
  timeout_seconds: 10

accounts:
  - account_id: "<production_account_id>"
    alias: "生产账户"
    broker_id: "huaxin"
    gateway_id: "<production_gateway_id>"
    stream_prefix: "relay:prod:v1:huaxin:<production_gateway_id>"
    enabled: true
    # Flip this to true only after read-only redis-probe, status checks, and
    # account route review have passed on the production host.
    trading_enabled: false
    simulated: false

jobs:
  pre_open_init:
    enabled: true
    schedule: "25 8 * * 1-5"
  post_close_settlement:
    enabled: true
    schedule: "30 15 * * 1-5"
  reconcile:
    enabled: true
    schedule: "30 16 * * 1-5"
  asset_snapshot:
    enabled: true
    schedule: "55 15 * * 1-5"
  pnl:
    enabled: true
    schedule: "10 17 * * 1-5"
